<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlinkoPalooza</title>

<style>
  :root {
    --board-width: 600px;
    --board-height: 800px;
    --green-hit: #29ff65;
  }

  body {
    font-family: Arial, sans-serif;
    background-color: #1e1e2f;
    color: white;
    text-align: center;
    margin: 0;
  }

  h1 { margin: 20px 0; }

  #game-info {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    font-size: 20px;
  }

  #round-message {
    min-height: 28px;
    margin: 8px 0 10px;
    font-size: 20px;
    font-weight: bold;
    color: #ffcc00;
  }

  #sound-status {
    margin: 0 auto 12px;
    max-width: 600px;
    min-height: 28px;
    font-size: 15px;
    color: #d8d8ff;
  }

  #enable-sound-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 6px;
    background: #ffcc00;
    color: #111;
    font-weight: bold;
    cursor: pointer;
  }

  #enable-sound-btn:hover { background: #e6b800; }

  #plinko-board {
    position: relative;
    margin: 0 auto;
    width: var(--board-width);
    height: var(--board-height);
    background-color: #2b2b4d;
    border: 2px solid white;
    overflow: hidden;
    cursor: crosshair;
    box-shadow: 0 0 25px rgba(0,0,0,0.35);
  }

  #little-man {
    position: absolute;
    top: 10px;
    left: 50%;
    width: 34px;
    height: 50px;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 10;
    animation: player-idle 0.45s infinite alternate ease-in-out;
  }

  #little-man * {
    position: absolute;
    box-sizing: border-box;
  }

  .cap-top {
    width: 24px;
    height: 8px;
    left: 5px;
    top: 0;
    background: #f03333;
    border: 2px solid #111;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
  }

  .cap-bill {
    width: 30px;
    height: 7px;
    left: 2px;
    top: 7px;
    background: #f03333;
    border: 2px solid #111;
    border-radius: 2px;
  }

  .head {
    width: 24px;
    height: 18px;
    left: 5px;
    top: 13px;
    background: #ffca8a;
    border: 2px solid #111;
    border-radius: 4px;
  }

  .eye {
    width: 4px;
    height: 4px;
    top: 19px;
    background: #111;
  }

  .eye.left { left: 12px; }
  .eye.right { left: 20px; }

  .mustache {
    width: 16px;
    height: 5px;
    left: 9px;
    top: 23px;
    background: #3b1b0f;
    border-radius: 0 0 8px 8px;
    z-index: 2;
  }

  .mouth {
    width: 11px;
    height: 6px;
    left: 11px;
    top: 27px;
    border-bottom: 3px solid #111;
    border-radius: 0 0 12px 12px;
    display: none;
    z-index: 3;
  }

  #little-man.celebrate .mouth {
    display: block;
  }

  .body {
    width: 26px;
    height: 18px;
    left: 4px;
    top: 31px;
    background: #1f6bff;
    border: 2px solid #111;
    border-radius: 2px;
  }

  .shirt {
    width: 26px;
    height: 8px;
    left: 4px;
    top: 31px;
    background: #f03333;
    border-left: 2px solid #111;
    border-right: 2px solid #111;
  }

  .button {
    width: 4px;
    height: 4px;
    top: 40px;
    background: #ffd54a;
    border: 1px solid #111;
    border-radius: 50%;
    z-index: 4;
  }

  .button.left { left: 11px; }
  .button.right { left: 20px; }

  .arm {
    width: 8px;
    height: 20px;
    top: 32px;
    background: #f03333;
    border: 2px solid #111;
    transform-origin: top center;
    animation: arm-swing 0.45s infinite alternate ease-in-out;
  }

  .arm.left { left: -1px; }
  .arm.right { right: -1px; animation-delay: 0.2s; }

  .hand {
    width: 9px;
    height: 9px;
    top: 47px;
    background: #ffca8a;
    border: 2px solid #111;
    border-radius: 50%;
  }

  .hand.left { left: -2px; }
  .hand.right { right: -2px; }

  .leg {
    width: 10px;
    height: 13px;
    top: 47px;
    background: #1f6bff;
    border: 2px solid #111;
    transform-origin: top center;
    animation: leg-step 0.45s infinite alternate ease-in-out;
  }

  .leg.left { left: 7px; }
  .leg.right { right: 7px; animation-delay: 0.2s; }

  .shoe {
    width: 13px;
    height: 6px;
    top: 58px;
    background: #5c2b13;
    border: 2px solid #111;
    border-radius: 2px;
  }

  .shoe.left { left: 4px; }
  .shoe.right { right: 4px; }

  @keyframes player-idle {
    from { transform: translate(-50%, 0); }
    to   { transform: translate(-50%, 5px); }
  }

  @keyframes arm-swing {
    from { transform: rotate(-16deg); }
    to   { transform: rotate(16deg); }
  }

  @keyframes leg-step {
    from { transform: rotate(-8deg); }
    to   { transform: rotate(8deg); }
  }

  #little-man.drop {
    animation: player-squat 0.22s ease;
  }

  @keyframes player-squat {
    0% { transform: translate(-50%, 0) scaleY(1); }
    50% { transform: translate(-50%, 8px) scaleY(0.78); }
    100% { transform: translate(-50%, 0) scaleY(1); }
  }

  #little-man.celebrate {
    animation: player-celebrate 0.28s infinite alternate ease-in-out;
  }

  #little-man.celebrate .arm.left {
    left: -2px;
    top: 29px;
    transform: rotate(180deg);
    animation: none;
  }

  #little-man.celebrate .arm.right {
    right: -2px;
    top: 29px;
    transform: rotate(180deg);
    animation: none;
  }

  #little-man.celebrate .hand.left { left: -4px; top: 6px; }
  #little-man.celebrate .hand.right { right: -4px; top: 6px; }

  @keyframes player-celebrate {
    from { transform: translate(-50%, 0) scale(1); }
    to { transform: translate(-50%, -8px) scale(1.06); }
  }

  .peg {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: #ffcc00;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255, 204, 0, 0.55);
  }

  .slot {
    position: absolute;
    width: 80px;
    height: 25px;
    background-color: #1e1e2f;
    border: 1px solid white;
    bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
    font-weight: bold;
    transition: transform 0.08s ease;
  }

  .slot.hit {
    animation: flash-green 0.16s alternate 10;
    transform: scale(1.08);
    z-index: 5;
  }

  @keyframes flash-green {
    from {
      background-color: #1e1e2f;
      color: white;
      box-shadow: none;
    }
    to {
      background-color: var(--green-hit);
      color: #061806;
      box-shadow: 0 0 18px var(--green-hit), 0 0 36px rgba(41,255,101,0.65);
    }
  }

  .divider {
    position: absolute;
    width: 4px;
    height: 120px;
    background-color: white;
    bottom: 25px;
    z-index: 3;
  }

  .ball {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: white;
    border-radius: 50%;
    z-index: 1;
    box-shadow: inset -4px -4px 7px rgba(0,0,0,0.2), 0 0 8px rgba(255,255,255,0.5);
  }

  .firework {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 20;
  }

  .spark {
    position: absolute;
    width: 6px;
    height: 6px;
    left: 0;
    top: 0;
    border-radius: 50%;
    background: hsl(var(--hue), 100%, 62%);
    animation: spark-pop 900ms ease-out forwards;
  }

  @keyframes spark-pop {
    0% {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(var(--tx), var(--ty)) scale(0.25);
    }
  }

  #reset-btn {
    margin-top: 15px;
    margin-bottom: 24px;
    padding: 10px 20px;
    font-size: 16px;
    background: #ffcc00;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
  }

  #reset-btn:hover { background: #e6b800; }
</style>
</head>

<body>

<h1>PlinkoPalooza 🔊</h1>

<div id="game-info">
  <div id="score">Total Score: 0</div>
  <div id="balls-left">Balls Left: 5</div>
</div>

<div id="sound-status">
  <button id="enable-sound-btn" type="button">Enable Sound 🔊</button>
  <span id="sound-note">Click once to unlock game audio and play the intro theme.</span>
</div>

<div id="round-message">Click the board to drop a ball.</div>

<div id="plinko-board">
  <div id="little-man" aria-hidden="true">
    <div class="cap-top"></div>
    <div class="cap-bill"></div>
    <div class="head"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="mustache"></div>
    <div class="mouth"></div>
    <div class="shirt"></div>
    <div class="body"></div>
    <div class="button left"></div>
    <div class="button right"></div>
    <div class="arm left"></div>
    <div class="arm right"></div>
    <div class="hand left"></div>
    <div class="hand right"></div>
    <div class="leg left"></div>
    <div class="leg right"></div>
    <div class="shoe left"></div>
    <div class="shoe right"></div>
  </div>
</div>

<button id="reset-btn">New Round</button>

// Sound system
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const ballDropLoop = new Audio(BALL_DROP_SOUND_SRC);
ballDropLoop.loop = true;
ballDropLoop.volume = 0.35;
ballDropLoop.preload = 'auto';

const firstBallSound = new Audio(FIRST_BALL_SOUND_SRC);
firstBallSound.volume = 0.8;
firstBallSound.preload = 'auto';

const pageOpenSound = new Audio(PAGE_OPEN_SOUND_SRC);
pageOpenSound.volume = 0.75;
pageOpenSound.preload = 'auto';

const celebrationSound = new Audio(CELEBRATION_SOUND_SRC);
celebrationSound.volume = 0.9;
celebrationSound.preload = 'auto';

let soundUnlocked = false;
let pageOpenSoundPlayed = false;

function setSoundUi(enabled) {
  if (enabled) {
    enableSoundBtn.style.display = 'none';
    soundNote.textContent = 'Sound enabled.';
  } else {
    enableSoundBtn.style.display = 'inline-block';
    soundNote.textContent = 'Click once to unlock game audio and play the intro theme.';
  }
}

function unlockSound() {
  if (soundUnlocked) return Promise.resolve();

  soundUnlocked = true;
  setSoundUi(true);

  return audioCtx.resume().catch(() => {});
}

function playPageOpenSoundAfterUnlock() {
  unlockSound().then(() => {
    pageOpenSoundPlayed = true;
    pageOpenSound.pause();
    pageOpenSound.currentTime = 0;
    pageOpenSound.play().catch(() => {
      soundNote.textContent = 'Sound is enabled, but the intro theme was blocked by the browser.';
    });
  });
}

function startBallDropLoop() {
  if (!soundUnlocked) return;

  if (ballDropLoop.paused) {
    ballDropLoop.currentTime = 0;
    ballDropLoop.play().catch(() => {});
  }
}

function stopBallDropLoop() {
  if (!ballDropLoop.paused) {
    ballDropLoop.pause();
    ballDropLoop.currentTime = 0;
  }
}

function playFirstBallSound() {
  if (!soundUnlocked) return;

  firstBallSound.pause();
  firstBallSound.currentTime = 0;
  firstBallSound.play().catch(() => {});
}

function playCelebrationSound() {
  if (!soundUnlocked) return;

  celebrationSound.pause();
  celebrationSound.currentTime = 0;
  celebrationSound.play().catch(() => {});
}

function playSound(freq, duration, volume = 0.08) {
  if (!soundUnlocked) return;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// Peg settings
const pegRows = 16;
const pegsPerRow = 13;
const pegSpacing = 45;
const ballRadius = 10;
const pegRadius = 5;

// Physics settings
const gravity = 0.26;
const restitution = 0.68;
const horizontalKick = 0.55;
const maxFallSpeed = 10;
const airDrag = 0.988;

const slotScores = [10, 20, 50, 100, 200, 100, 50, 20, 10];
const slotWidth = board.offsetWidth / slotScores.length;

const pegs = [];
const slots = [];
const dividers = [];

const dividerZoneStart = board.offsetHeight - 160;

function updateHud() {
  scoreDisplay.textContent = `Total Score: ${totalScore}`;
  ballsLeftDisplay.textContent = `Balls Left: ${Math.max(0, maxBallsPerRound - ballsDroppedThisRound)}`;
}

// Create pegs
for (let row = 0; row < pegRows; row++) {
  for (let col = 0; col < pegsPerRow; col++) {
    const offset = (row % 2 === 0 ? pegSpacing / 2 : 0);
    const xPos = col * pegSpacing + offset;
    const yPos = row * pegSpacing + 40;

    if (yPos > dividerZoneStart) continue;
    if (xPos < 10 || xPos > board.offsetWidth - 20) continue;

    const peg = document.createElement('div');
    peg.classList.add('peg');
    peg.style.left = `${xPos}px`;
    peg.style.top = `${yPos}px`;

    board.appendChild(peg);
    pegs.push({ x: xPos + pegRadius, y: yPos + pegRadius });
  }
}

// Create slots
slotScores.forEach((score, i) => {
  const slot = document.createElement('div');
  slot.classList.add('slot');
  slot.style.left = `${i * slotWidth}px`;
  slot.style.width = `${slotWidth}px`;
  slot.dataset.score = score;
  slot.innerText = score;
  board.appendChild(slot);
  slots.push(slot);
});

// Create dividers
for (let i = 1; i < slotScores.length; i++) {
  const divider = document.createElement('div');
  divider.classList.add('divider');
  divider.style.left = `${i * slotWidth - 2}px`;
  board.appendChild(divider);
  dividers.push(divider);
}

function flashWinningSlot(slot) {
  slot.classList.remove('hit');
  void slot.offsetWidth;
  slot.classList.add('hit');
  setTimeout(() => slot.classList.remove('hit'), 1700);
}

function createFirework(x, y) {
  const firework = document.createElement('div');
  firework.classList.add('firework');
  firework.style.left = `${x}px`;
  firework.style.top = `${y}px`;

  const hue = Math.floor(Math.random() * 360);

  for (let i = 0; i < 18; i++) {
    const spark = document.createElement('div');
    spark.classList.add('spark');

    const angle = (Math.PI * 2 * i) / 18;
    const distance = 35 + Math.random() * 50;

    spark.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
    spark.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
    spark.style.setProperty('--hue', hue + Math.floor(Math.random() * 45));

    firework.appendChild(spark);
  }

  board.appendChild(firework);
  setTimeout(() => firework.remove(), 950);
}

function startFireworks() {
  let count = 0;
  const fireworksTimer = setInterval(() => {
    createFirework(
      70 + Math.random() * (board.offsetWidth - 140),
      85 + Math.random() * 240
    );
    playSound(500 + Math.random() * 350, 0.08, 0.04);
    count++;
    if (count >= 12) clearInterval(fireworksTimer);
  }, 170);
}

function checkRoundEnd() {
  if (ballsDroppedThisRound >= maxBallsPerRound && activeBalls === 0) {
    roundMessage.textContent = `Round complete! Final Score: ${totalScore}`;
    man.classList.add('celebrate');
    playCelebrationSound();
    startFireworks();
    playSound(880, 0.16, 0.09);
    setTimeout(() => playSound(1180, 0.2, 0.09), 160);
  }
}

function handlePegCollision(ballState, peg) {
  const dx = ballState.x - peg.x;
  const dy = ballState.y - peg.y;
  const distance = Math.hypot(dx, dy);
  const minDistance = ballRadius + pegRadius;

  if (distance > 0 && distance < minDistance) {
    const nx = dx / distance;
    const ny = dy / distance;

    ballState.x = peg.x + nx * minDistance;
    ballState.y = peg.y + ny * minDistance;

    const dot = ballState.vx * nx + ballState.vy * ny;
    ballState.vx = (ballState.vx - 2 * dot * nx) * restitution;
    ballState.vy = (ballState.vy - 2 * dot * ny) * restitution;

    ballState.vx += (Math.random() > 0.5 ? 1 : -1) * horizontalKick;
    ballState.vy -= 0.08;

    playSound(760 + Math.random() * 120, 0.035, 0.045);
  }
}

function handleWallAndDividerBounce(ballState) {
  if (ballState.x < ballRadius) {
    ballState.x = ballRadius;
    ballState.vx = Math.abs(ballState.vx) * restitution;
  }

  if (ballState.x > board.offsetWidth - ballRadius) {
    ballState.x = board.offsetWidth - ballRadius;
    ballState.vx = -Math.abs(ballState.vx) * restitution;
  }

  dividers.forEach(div => {
    const divX = div.offsetLeft + 2;
    const dividerTop = board.offsetHeight - 145;
    const dividerBottom = board.offsetHeight - 25;

    if (ballState.y > dividerTop && ballState.y < dividerBottom) {
      const distanceFromDivider = ballState.x - divX;

      if (Math.abs(distanceFromDivider) < ballRadius + 2) {
        if (distanceFromDivider < 0) {
          ballState.x = divX - ballRadius - 2;
          ballState.vx = -Math.abs(ballState.vx || 1.4) * 0.72;
        } else {
          ballState.x = divX + ballRadius + 2;
          ballState.vx = Math.abs(ballState.vx || 1.4) * 0.72;
        }
        playSound(420, 0.035, 0.035);
      }
    }
  });
}

function dropBallAt(x) {
  if (ballsDroppedThisRound >= maxBallsPerRound) {
    roundMessage.textContent = 'No balls left. Press New Round to play again.';
    return;
  }

  ballsDroppedThisRound++;

  if (ballsDroppedThisRound === 1) {
    playFirstBallSound();
  }

  activeBalls++;
  startBallDropLoop();
  updateHud();
  roundMessage.textContent = `Ball ${ballsDroppedThisRound} of ${maxBallsPerRound}`;

  playSound(300, 0.08);

  const ball = document.createElement('div');
  ball.classList.add('ball');
  board.appendChild(ball);

  const ballState = {
    x: Math.max(ballRadius, Math.min(board.offsetWidth - ballRadius, x)),
    y: 64,
    vx: (Math.random() - 0.5) * 1.4,
    vy: 1.5
  };

  let landed = false;

  function animateBall() {
    if (landed) return;

    ballState.vy += gravity;
    ballState.vx *= airDrag;
    ballState.vy = Math.min(ballState.vy, maxFallSpeed);

    ballState.x += ballState.vx;
    ballState.y += ballState.vy;

    pegs.forEach(peg => handlePegCollision(ballState, peg));
    handleWallAndDividerBounce(ballState);

    ball.style.left = `${ballState.x - ballRadius}px`;
    ball.style.top = `${ballState.y - ballRadius}px`;

    if (ballState.y > board.offsetHeight - 15) {
      landed = true;

      let slotIndex = Math.floor(ballState.x / slotWidth);
      slotIndex = Math.max(0, Math.min(slotScores.length - 1, slotIndex));

      const slotCenterX = slotIndex * slotWidth + slotWidth / 2;
      ball.style.left = `${slotCenterX - ballRadius}px`;
      ball.style.top = `${board.offsetHeight - 30}px`;

      const slot = slots[slotIndex];
      const score = parseInt(slot.dataset.score, 10);

      totalScore += score;
      updateHud();
      flashWinningSlot(slot);
      playSound(200 + score * 2, 0.18, 0.09);

      activeBalls--;
      if (activeBalls === 0) stopBallDropLoop();
      checkRoundEnd();

      setTimeout(() => ball.remove(), 1000);
      return;
    }

    requestAnimationFrame(animateBall);
  }

  requestAnimationFrame(animateBall);
}

board.addEventListener('mousemove', (e) => {
  const boardRect = board.getBoundingClientRect();
  const x = e.clientX - boardRect.left;
  man.style.left = `${Math.max(20, Math.min(board.offsetWidth - 20, x))}px`;
});

board.addEventListener('click', (e) => {
  unlockSound();

  const boardRect = board.getBoundingClientRect();
  const x = e.clientX - boardRect.left;

  man.classList.remove('celebrate');
  man.classList.add('drop');
  setTimeout(() => man.classList.remove('drop'), 220);

  dropBallAt(x);
});

resetBtn.addEventListener('click', () => {
  document.querySelectorAll('.ball').forEach(b => b.remove());
  document.querySelectorAll('.firework').forEach(f => f.remove());
  slots.forEach(slot => slot.classList.remove('hit'));

  totalScore = 0;
  ballsDroppedThisRound = 0;
  activeBalls = 0;

  stopBallDropLoop();
  firstBallSound.pause();
  firstBallSound.currentTime = 0;
  pageOpenSound.pause();
  celebrationSound.pause();
  celebrationSound.currentTime = 0;

  man.classList.remove('celebrate', 'drop');
  roundMessage.textContent = 'Click the board to drop a ball.';
  updateHud();
});

enableSoundBtn.addEventListener('click', playPageOpenSoundAfterUnlock);

updateHud();
setSoundUi(false);
</script>
